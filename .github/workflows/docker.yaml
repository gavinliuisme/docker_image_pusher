name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'version.txt'
  schedule:
    - cron: "0 20 * * *"

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  DOCKER_CLIENT_TIMEOUT: 120
  COMPOSE_HTTP_TIMEOUT: 120

permissions:
  contents: write

jobs:
  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Aliyun Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.ALIYUN_REGISTRY }}
        username: ${{ secrets.ALIYUN_REGISTRY_USER }}
        password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

    - name: Build and push image Aliyun
      run: |
        set -e

        # --- 1. 定义重试函数 ---
        function retry_command() {
            local max_attempts=$1
            local delay=$2
            local cmd="${@:3}"
            local attempt=1
            
            while [ $attempt -le $max_attempts ]; do
                echo "正在执行 (尝试 $attempt/$max_attempts): $cmd"
                if eval "$cmd"; then
                    return 0
                else
                    echo "命令执行失败。"
                    if [ $attempt -lt $max_attempts ]; then
                        echo "等待 ${delay} 秒后重试..."
                        sleep $delay
                    fi
                fi
                ((attempt++))
            done
            echo "命令在 $max_attempts 次尝试后依然失败: $cmd"
            return 1
        }

        # --- 2. 定义获取远程镜像 Digest 的函数 ---
        function get_remote_digest() {
            local image=$1
            local platform=$2
            local digest=""
            
            if [ -z "$platform" ]; then
                platform="linux/amd64"
            fi
            
            local os=$(echo "$platform" | cut -d'/' -f1)
            local arch=$(echo "$platform" | cut -d'/' -f2)

            local inspect_output
            inspect_output=$(docker manifest inspect --verbose "$image" 2>/dev/null)
            
            if [ $? -eq 0 ]; then
                digest=$(echo "$inspect_output" | jq -r --arg os "$os" --arg arch "$arch" \
                    '.[] | select(.Descriptor.platform.os==$os and .Descriptor.platform.architecture==$arch) | .Descriptor.digest' | head -n 1)
                
                if [ -z "$digest" ]; then
                    digest=$(echo "$inspect_output" | jq -r '.[0].Descriptor.digest // empty' 2>/dev/null)
                fi
                if [ -z "$digest" ]; then
                     digest=$(echo "$inspect_output" | jq -r '.Descriptor.digest // empty' 2>/dev/null)
                fi
            fi
            echo "$digest"
        }

        # --- 3. 初始化数据 ---
        VERSION_FILE="version.txt"
        declare -A version_map
        declare -a ordered_keys
        
        if [ -f "$VERSION_FILE" ]; then
            echo "读取历史版本记录 $VERSION_FILE ..."
            while IFS="=" read -r key val; do
                [[ -z "$key" ]] && continue
                version_map["$key"]="$val"
            done < "$VERSION_FILE"
        else
            echo "未找到 $VERSION_FILE，将创建新文件。"
        fi

        HAS_UPDATE=0

        # --- 4. 第一遍循环：检测重名镜像 ---
        declare -A duplicate_images
        declare -A temp_map

        local TOTAL_IMAGES=0
        local CURRENT_NUM=0
        
        while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue            
            ((TOTAL_IMAGES++))
            if echo "$line" | grep -q '^\s*#'; then continue; fi
            
            image=$(echo "$line" | tr ' ' '\n' | grep -v '^--' | head -n 1)
            if [[ -z "$image" ]]; then continue; fi
            image="${image%%@*}"
            
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
            
            name_space_key="${name_space}_"
            
            if [[ -n "${temp_map[$image_name]}" ]]; then
                 if [[ "${temp_map[$image_name]}" != "${name_space_key}" ]]; then
                    duplicate_images[$image_name]="true"
                 fi
            else
                temp_map[$image_name]="${name_space_key}"
            fi       
        done < images.txt
        
        
        # --- 5. 第二遍循环：对比、同步、记录顺序 ---
        while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then continue; fi

            # 增加计数器
            ((CURRENT_NUM++))
        
            platform=""
            if [[ "$line" == *"--platform"* ]]; then
                platform=$(echo "$line" | grep -oP '(?<=--platform[ =])[^\s]+')
            fi
            
            image=$(echo "$line" | tr ' ' '\n' | grep -v '^--' | head -n 1)
            
            inspect_platform=$platform
            if [ -z "$inspect_platform" ]; then
                inspect_platform="linux/amd64"
            fi
            
            # --- Key 直接使用 image 变量 (完整镜像名) ---
            map_key="$image"
            
            # 解析用于构造目标名称的变量
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
            
            # 构造推送到阿里云的实际名称
            name_space_prefix=""
            if [[ -n "${duplicate_images[$image_name]}" ]]; then
               if [[ -n "${name_space}" ]]; then
                  name_space_prefix="${name_space}_"
               fi
            fi
            
            image_name_tag_no_digest="${image_name_tag%%@*}"
            
            if [ -z "$platform" ]; then
                platform_prefix=""
            else
                platform_prefix="${platform//\//_}_"
            fi
            
            new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$platform_prefix$name_space_prefix$image_name_tag_no_digest"
            
            ordered_keys+=("$map_key")
            
            echo "=============================================================================="
            echo "检查镜像: $image ($CURRENT_NUM/$TOTAL_IMAGES)"
            echo "目标名称: $new_image"
            echo "记录Key : $map_key"
            
            # 获取远程 Digest
            source_digest=$(get_remote_digest "$image" "$inspect_platform")
            
            if [ -z "$source_digest" ]; then
                echo "警告: 无法获取源镜像指纹，将强制尝试同步。"
            fi
            
            local_record="${version_map[$map_key]}"
            
            # 判断是否需要更新
            if [ -n "$source_digest" ] && [ "$source_digest" == "$local_record" ]; then
                echo ">>> 本地记录匹配 (Digest: $source_digest)，跳过同步。"
                continue
            fi
            
            echo ">>> 发现更新 (本地: $local_record vs 远程: $source_digest)，开始同步..."

            if [ -z "$platform" ]; then
                pull_cmd="docker pull $image"
            else
                pull_cmd="docker pull --platform $platform $image"
            fi
            
            retry_command 3 5 "$pull_cmd"
            
            docker tag "$image" "$new_image"
            retry_command 3 10 "docker push $new_image"
            
            # --- 恢复使用远程 Digest 更新记录 ---
            # 只有当 source_digest 不为空时才更新，防止覆盖有效记录
            if [ -n "$source_digest" ]; then
                version_map["$map_key"]="$source_digest"
                HAS_UPDATE=1
            else
                echo ">>> 由于未获取到指纹，未更新 version.txt 记录。"
            fi
            
            docker rmi "$image" "$new_image" || true
            
        done < images.txt

        # --- 6. 更新 version.txt 文件 ---
        if [ "$HAS_UPDATE" -eq 1 ] || [ ! -f "$VERSION_FILE" ]; then
            echo "更新 $VERSION_FILE 文件..."
            rm -f "$VERSION_FILE"
            for key in "${ordered_keys[@]}"; do
                echo "$key=${version_map[$key]}" >> "$VERSION_FILE"
            done
        fi

    - name: Commit version file
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add version.txt
        if git diff --staged --quiet; then
            echo "没有需要提交的变更。"
        else
            git commit -m "chore: update image versions [skip ci]"
            git push
        fi
