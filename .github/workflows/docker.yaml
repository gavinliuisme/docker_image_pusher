name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 20 * * *"

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  # 增加 Docker 客户端超时时间，防止大文件传输中断
  DOCKER_CLIENT_TIMEOUT: 120
  COMPOSE_HTTP_TIMEOUT: 120

jobs:
  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    # 增加可用磁盘空间
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        # 如果空间还是不够用，可以把以下开启，清理出更多空间
        # remove-android: 'true'
        # remove-codeql: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    # 使用官方 Action 登录，更安全
    - name: Login to Aliyun Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.ALIYUN_REGISTRY }}
        username: ${{ secrets.ALIYUN_REGISTRY_USER }}
        password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

    - name: Build and push image Aliyun
      run: |
        set -e # 遇到错误立即退出

        # --- 定义重试函数 ---
        # 参数1: 最大尝试次数, 参数2: 间隔秒数, 参数3: 要执行的命令
        function retry_command() {
            local max_attempts=$1
            local delay=$2
            local cmd="${@:3}"
            local attempt=1
            
            while [ $attempt -le $max_attempts ]; do
                echo "正在执行 (尝试 $attempt/$max_attempts): $cmd"
                if eval "$cmd"; then
                    return 0
                else
                    echo "命令执行失败。"
                    if [ $attempt -lt $max_attempts ]; then
                        echo "等待 ${delay} 秒后重试..."
                        sleep $delay
                    fi
                fi
                ((attempt++))
            done
            
            echo "命令在 $max_attempts 次尝试后依然失败: $cmd"
            return 1
        }

        # --- 第一遍循环：检测重名镜像 ---
        declare -A duplicate_images
        declare -A temp_map
        
        while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行与注释
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then continue; fi
            
            # 提取镜像名称（过滤掉 --参数）
            image=$(echo "$line" | tr ' ' '\n' | grep -v '^--' | head -n 1)
            if [[ -z "$image" ]]; then continue; fi
            
            # 去除摘要信息
            image="${image%%@*}"
            
            # 提取命名空间
            name_space=$(echo "$image" | awk -F'/' '{
                if (NF==3) print $2; 
                else if (NF==2) print $1; 
                else print ""
            }')
            
            # 提取镜像名（不含tag）
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
            
            # 用于判断重名的 Key
            name_space_key="${name_space}_"
            
            if [[ -n "${temp_map[$image_name]}" ]]; then
                 if [[ "${temp_map[$image_name]}" != "${name_space_key}" ]]; then
                    echo "检测到重名镜像: $image_name (命名空间不同)"
                    duplicate_images[$image_name]="true"
                 fi
            else
                temp_map[$image_name]="${name_space_key}"
            fi       
        done < images.txt
        
        
        # --- 第二遍循环：拉取、打标签、推送 ---
        while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then continue; fi
        
            # 1. 解析 Platform 参数
            platform=""
            if [[ "$line" == *"--platform"* ]]; then
                platform=$(echo "$line" | grep -oP '(?<=--platform[ =])[^\s]+')
            fi
            
            # 2. 提取镜像名称
            image=$(echo "$line" | tr ' ' '\n' | grep -v '^--' | head -n 1)
            
            # 3. 构建 Docker Pull 命令 (修复参数顺序)
            if [ -z "$platform" ]; then
                pull_cmd="docker pull $image"
                platform_prefix=""
            else
                pull_cmd="docker pull --platform $platform $image"
                platform_prefix="${platform//\//_}_"
            fi
            
            # 执行 Pull (带重试)
            retry_command 3 5 "$pull_cmd"
            
            # 4. 计算目标镜像标签
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            name_space=$(echo "$image" | awk -F'/' '{
                if (NF==3) print $2; 
                else if (NF==2) print $1; 
                else print ""
            }')
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
        
            name_space_prefix=""
            # 如果是重名镜像，加上命名空间前缀
            if [[ -n "${duplicate_images[$image_name]}" ]]; then
               if [[ -n "${name_space}" ]]; then
                  name_space_prefix="${name_space}_"
               fi
            fi
            
            # 去除摘要信息
            image_name_tag="${image_name_tag%%@*}"
            
            # 组装新镜像名
            new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$platform_prefix$name_space_prefix$image_name_tag"
            
            docker tag "$image" "$new_image"
            
            # 执行 Push (带重试，增加间隔时间)
            retry_command 3 10 "docker push $new_image"
            
            echo "开始清理磁盘空间"
            echo "=============================================================================="
            df -hT
            echo "=============================================================================="
            
            # 清理镜像，|| true 防止因镜像未找到而报错中断
            docker rmi "$image" "$new_image" || true
            
            echo "磁盘空间清理完毕"
            echo "=============================================================================="
            df -hT
            echo "=============================================================================="     
            
        done < images.txt
